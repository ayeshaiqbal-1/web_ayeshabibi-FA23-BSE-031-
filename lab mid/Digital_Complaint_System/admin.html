<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ComplaintGuard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fas fa-shield-alt"></i> ComplaintGuard
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="complaint.html">Register</a></li>
            <li><a href="track.html">Tracking</a></li>
            <li><a href="admin.html" style="color: var(--primary-color)">Dashboard</a></li>
        </ul>
        <div class="nav-actions">
            <button id="themeToggle" class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
            <div id="authActions"></div>
        </div>
    </nav>

    <div class="container animate-fade">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin: 2rem 0;">
            <div>
                <h1>Admin Dashboard</h1>
                <p>Manage and resolve student complaints efficiently.</p>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.8rem;">Status</label>
                    <select id="filterStatus" class="form-control" style="width: 150px;">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="font-size: 0.8rem;">Category</label>
                    <select id="filterCategory" class="form-control" style="width: 150px;">
                        <option value="">All Categories</option>
                        <option value="Technical">Technical Support</option>
                        <option value="Billing">Billing & Payments</option>
                        <option value="Service">Customer Service</option>
                        <option value="Feedback">Feedback</option>
                        <option value="General">General</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Complaint ID</th>
                        <th>User Info</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    <!-- Data will be injected here by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <footer style="padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; margin-top: 4rem;">
        <p>&copy; 2026 ComplaintGuard. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
