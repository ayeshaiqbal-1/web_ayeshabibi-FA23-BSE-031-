<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint | ComplaintGuard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fas fa-shield-alt"></i> ComplaintGuard
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="complaint.html" style="color: var(--primary-color)">Register Complaint</a></li>
            <li><a href="track.html">Track Status</a></li>
            <li><a href="admin.html">Admin Dashboard</a></li>
        </ul>
        <div class="nav-actions">
            <button id="themeToggle" class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="form-container animate-fade">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-file-signature" style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                <h2>Submit Your Complaint</h2>
                <p>Provide detailed information to help us resolve your issue faster.</p>
            </div>

            <form id="complaintForm">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Enter your full name" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="+1 (234) 567-890">
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Complaint Category *</label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Technical">Technical Support</option>
                        <option value="Billing">Billing & Payments</option>
                        <option value="Service">Customer Service</option>
                        <option value="Feedback">Feedback & Suggestions</option>
                        <option value="General">General Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Complaint Description *</label>
                    <textarea id="description" name="description" class="form-control" rows="5" placeholder="Describe your issue in detail..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="file">Attachment (Optional)</label>
                    <input type="file" id="file" name="file" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                    Submit Complaint <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <footer style="padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; margin-top: 4rem;">
        <p>&copy; 2026 ComplaintGuard. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
